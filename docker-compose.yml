services:
  vram-coordinator:
    image: ghcr.io/jheizman/vram-coordinator:dev
    container_name: vram-coordinator
    env_file:
      - .env
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=utility